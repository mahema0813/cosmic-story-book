<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Moonveil Stories 🌙</title>

  <link rel="icon" type="image/png" href="Moonveil%20stories%20favicon.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🌌 Cosmic Background -->
  <div class="sky">
    <div class="star">⭐</div>
    <div class="star">🌙</div>
    <div class="star">✨</div>
    <div class="star">⭐</div>
    <div class="star">🌙</div>
  </div>

  <!-- 📕 Book Cover -->
  <div class="book" id="book" onclick="openBook()">

    <div class="title">
      🌙<br>
      Moonveil Stories
    </div>

  </div>

  <!-- 📖 Open Book -->
  <div class="open-book hidden" id="openBook">

    <!-- Left Page -->
    <div class="left">

      <div class="menu-item close-btn" onclick="closeBook()">
        🌙 Close Book
      </div>

      <div class="menu-item" onclick="goTo('stories')">
        📖 Stories
      </div>

      <div class="menu-item" onclick="goTo('write')">
        ✍️ Write
      </div>

      <div class="menu-item" onclick="goTo('mood')">
        🌌 Mood Board
      </div>

      <div class="menu-item" onclick="goTo('characters')">
        🎭 Characters
      </div>

    </div>

    <!-- Right Page -->
    <div class="right" id="content">

      <h2>🌙 Welcome to Moonveil</h2>

      <p>
        Select a page from the left to begin your story.
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
