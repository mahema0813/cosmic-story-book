<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moonveil Stories 🌙</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="scene">

  <!-- CLOSED BOOK -->
  <div id="book" onclick="openBook()">
    🌙 Welcome to Moonveil Stories
  </div>

  <!-- OPEN BOOK -->
  <div id="openBook" class="hidden">

    <!-- LEFT PAGE -->
    <div class="page left">
      <div class="menu">
        <div onclick="goTo('stories')">📖 Stories</div>
        <div onclick="goTo('write')">✍️ Write</div>
        <div onclick="goTo('mood')">🌌 Mood Board</div>
        <div onclick="goTo('characters')">🎭 Characters</div>
      </div>
    </div>

    <!-- RIGHT PAGE -->
    <div class="page right" id="content">
      <h2>🌙 Welcome</h2>
      <p>Select a page from the left.</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
